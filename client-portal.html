<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YAKU Accounting — Client Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #08060a;
      --glass:         rgba(40,28,8,.5);
      --glass-subtle:  rgba(30,20,4,.38);
      --glass-input:   rgba(15,10,2,.72);
      --border:        rgba(201,162,39,.14);
      --border-strong: rgba(201,162,39,.28);
      --gold:          #c9a227;
      --gold-bright:   #e8c040;
      --gold-dim:      rgba(201,162,39,.35);
      --gold-glass:    rgba(201,162,39,.1);
      --cyan:          #c9a227; /* aliased to gold */
      --cyan-dim:      rgba(201,162,39,.2);
      --text:          #f5ead6;
      --text-muted:    #8a7055;
      --text-dim:      #4a3a25;
      --white:         #fdf8f0;
      --green:         #5dba7a;
      --green-glass:   rgba(20,55,30,.45);
      --red:           #e06060;
      --red-glass:     rgba(60,15,15,.45);
      --blur:          22px;
    }

    html, body {
      height: 100%;
      background:
        radial-gradient(circle at 82%  -8%, rgba(201,162,39,.14) 0%, transparent 42%),
        radial-gradient(circle at -5%  95%, rgba(160,100,15,.10) 0%, transparent 40%),
        radial-gradient(circle at 50%  50%, rgba(90, 55,  5,.04) 0%, transparent 65%),
        var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::after {
      content: '';
      pointer-events: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      opacity: .02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    /* ── Topbar ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(20,13,3,.90);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      z-index: 100;
    }

    .topbar-logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.35rem;
      letter-spacing: .25em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .topbar-logo span { color: var(--text-muted); font-weight: 300; font-size: 1rem; letter-spacing: .15em; }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      font-size: .75rem;
      letter-spacing: .05em;
    }

    .topbar-right .user-chip {
      display: flex;
      align-items: center;
      gap: .5rem;
      color: var(--text-muted);
    }

    .user-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(201,162,39,.15);
      border: 1px solid var(--border-strong);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Outfit', sans-serif;
      font-size: .62rem;
      font-weight: 600;
      color: var(--gold);
    }

    .topbar-right a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color .2s;
      letter-spacing: .05em;
    }
    .topbar-right a:hover { color: var(--text); }
    .topbar-right a.logout { color: var(--red); }
    .topbar-right a.logout:hover { color: #f08080; }

    /* ── Layout ── */
    .portal-body {
      margin-top: 56px;
      min-height: calc(100vh - 56px);
      display: flex;
      flex-direction: column;
    }

    /* ── Tab nav ── */
    .tab-nav {
      display: flex;
      align-items: center;
      padding: 0 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(20,13,3,.6);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
    }

    .tab-btn {
      padding: .9rem 1.5rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: color .2s, border-color .2s;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); font-weight: 600; }

    /* ── Tab content ── */
    .tab-content {
      flex: 1;
      padding: 2.5rem 2rem;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── Section heading ── */
    .section-heading {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 1.75rem;
    }

    .section-heading h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: .06em;
      color: var(--white);
    }

    .section-heading .tag {
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: .2rem .55rem;
      border: 1px solid var(--border);
      border-radius: 3px;
    }

    /* ── Card ── */
    .card {
      background: var(--glass);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 0 40px rgba(201,162,39,.04), 0 16px 40px rgba(0,0,0,.3);
    }

    /* ── Form ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    .form-group { display: flex; flex-direction: column; gap: .45rem; }
    .form-group.full { grid-column: 1 / -1; }

    .form-group label {
      font-size: .68rem;
      font-weight: 500;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .form-group input {
      background: var(--glass-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .7rem .9rem;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: .88rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-group input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,162,39,.1); }
    .form-group input::placeholder { color: var(--text-dim); }
    .form-group input[readonly] { color: var(--text-muted); cursor: not-allowed; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .65rem 1.4rem;
      border: none; border-radius: 6px;
      cursor: pointer; font-family: 'Outfit', sans-serif;
      font-size: .72rem; font-weight: 600; letter-spacing: .14em;
      text-transform: uppercase; transition: all .2s;
    }

    .btn-primary {
      background: var(--gold); color: #08060a;
      box-shadow: 0 4px 20px rgba(201,162,39,.22);
    }
    .btn-primary:hover { background: var(--gold-bright); box-shadow: 0 4px 28px rgba(201,162,39,.32); }
    .btn-primary:disabled { background: rgba(201,162,39,.4); cursor: not-allowed; box-shadow: none; }

    .btn-outline {
      background: transparent; color: var(--gold);
      border: 1px solid var(--border-strong);
    }
    .btn-outline:hover { background: var(--gold-glass); }

    .btn-danger {
      background: transparent; color: var(--red);
      border: 1px solid rgba(200,80,80,.22);
    }
    .btn-danger:hover { background: var(--red-glass); }

    .btn-sm { padding: .35rem .8rem; font-size: .62rem; }

    /* ── Alert ── */
    .alert {
      padding: .7rem 1rem; border-radius: 6px;
      font-size: .75rem; letter-spacing: .03em;
      margin-bottom: 1.25rem; display: none;
    }
    .alert.visible { display: block; }
    .alert-success { background: var(--green-glass); border: 1px solid rgba(93,186,122,.22); color: var(--green); }
    .alert-error   { background: var(--red-glass);   border: 1px solid rgba(200,80,80,.22);  color: var(--red);   }

    /* ── Documents ── */
    .upload-zone {
      border: 1px dashed var(--border-strong);
      border-radius: 10px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
      margin-bottom: 1.25rem;
      background: var(--glass-subtle);
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--gold);
      background: rgba(201,162,39,.06);
    }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .upload-icon { font-size: 2rem; margin-bottom: .75rem; color: var(--gold-dim); }
    .upload-text {
      font-family: 'Outfit', sans-serif;
      font-size: .72rem; font-weight: 600; letter-spacing: .14em;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: .35rem;
    }
    .upload-sub { font-size: .72rem; color: var(--text-dim); }

    .doc-table { width: 100%; border-collapse: collapse; }
    .doc-table th {
      text-align: left; font-size: .68rem; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--text-muted); padding: .55rem .85rem;
      border-bottom: 1px solid var(--border);
    }
    .doc-table td { padding: .8rem .85rem; font-size: .82rem; border-bottom: 1px solid rgba(201,162,39,.07); vertical-align: middle; }
    .doc-table tr:last-child td { border-bottom: none; }
    .doc-table tbody tr:hover td { background: rgba(201,162,39,.04); }

    .doc-name { color: var(--white); display: flex; align-items: center; gap: .5rem; }
    .doc-icon { color: var(--gold); font-size: .9rem; }
    .doc-size { color: var(--text-muted); }
    .doc-date { color: var(--text-muted); font-size: .75rem; }
    .doc-actions { display: flex; gap: .5rem; align-items: center; justify-content: flex-end; }

    .empty-row td {
      text-align: center; padding: 2.5rem;
      color: var(--text-muted); font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 1.05rem;
    }

    /* ── Processes ── */
    .process-card {
      background: var(--glass);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: .75rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
      transition: border-color .2s;
    }
    .process-card:hover { border-color: var(--border-strong); }

    .process-info { flex: 1; min-width: 0; }

    .process-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem; font-weight: 400;
      color: var(--white); margin-bottom: .25rem;
    }

    .process-desc { font-size: .78rem; color: var(--text-muted); }

    .process-meta { font-size: .72rem; color: var(--text-dim); margin-top: .3rem; }

    .status-badge {
      display: inline-flex; align-items: center; gap: .35rem;
      padding: .3rem .8rem; border-radius: 999px;
      font-family: 'Outfit', sans-serif;
      font-size: .65rem; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase; white-space: nowrap;
    }
    .status-badge::before {
      content: ''; width: 5px; height: 5px;
      border-radius: 50%; background: currentColor;
    }

    .badge-pending     { background: rgba(74,58,37,.35); color: var(--text-muted); border: 1px solid var(--border); }
    .badge-in_progress { background: var(--gold-glass);  color: var(--gold);        border: 1px solid var(--border-strong); }
    .badge-review      { background: rgba(93,186,122,.08); color: var(--green);     border: 1px solid rgba(93,186,122,.2); }
    .badge-completed   { background: var(--green-glass);  color: var(--green);      border: 1px solid rgba(93,186,122,.25); }

    .no-processes {
      text-align: center; padding: 3rem 2rem;
      color: var(--text-muted);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 1.1rem;
    }

    /* ── Upload progress ── */
    .upload-progress {
      display: none; align-items: center; gap: 1rem;
      padding: .75rem 1rem;
      background: var(--glass); border: 1px solid var(--border);
      border-radius: 6px; margin-bottom: 1.25rem; font-size: .75rem;
      backdrop-filter: blur(12px);
    }
    .upload-progress.visible { display: flex; }
    .progress-bar-wrap { flex: 1; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--gold); width: 0%; transition: width .3s; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }

    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      .tab-btn { padding: .8rem .9rem; font-size: .65rem; letter-spacing: .08em; }
      .topbar-right .user-chip span { display: none; }
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-logo">YAKU <span>Accounting</span></div>
    <div class="topbar-right">
      <div class="user-chip">
        <div class="user-avatar" id="user-initials">—</div>
        <span id="topbar-username"></span>
      </div>
      <a href="#" class="logout" onclick="logout()">Sign out</a>
    </div>
  </div>

  <!-- PORTAL BODY -->
  <div class="portal-body">

    <!-- TABS -->
    <nav class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('details', this)">My Details</button>
      <button class="tab-btn" onclick="switchTab('documents', this)">Documents</button>
      <button class="tab-btn" onclick="switchTab('processes', this)">Processes</button>
    </nav>

    <!-- CONTENT -->
    <div class="tab-content">

      <!-- MY DETAILS -->
      <div class="tab-pane active" id="tab-details">
        <div class="section-heading">
          <h2>Personal Details</h2>
          <span class="tag">Your Profile</span>
        </div>

        <div id="details-alert-success" class="alert alert-success"></div>
        <div id="details-alert-error"   class="alert alert-error"></div>

        <div class="card">
          <div class="form-grid">
            <div class="form-group full">
              <label>Email address</label>
              <input type="email" id="d-email" readonly />
            </div>
            <div class="form-group">
              <label>Full name *</label>
              <input type="text" id="d-name" placeholder="Jane Smith" />
            </div>
            <div class="form-group">
              <label>Phone</label>
              <input type="text" id="d-phone" placeholder="+27 82 000 0000" />
            </div>
            <div class="form-group full">
              <label>Company</label>
              <input type="text" id="d-company" placeholder="Smith Holdings (Pty) Ltd" />
            </div>
          </div>
          <div style="margin-top:1.5rem">
            <button class="btn btn-primary" id="btn-save-details" onclick="saveDetails()">Save Changes</button>
          </div>
        </div>
      </div>

      <!-- DOCUMENTS -->
      <div class="tab-pane" id="tab-documents">
        <div class="section-heading">
          <h2>Documents</h2>
          <span class="tag" id="doc-count-tag">0 files</span>
        </div>

        <div id="docs-alert-success" class="alert alert-success"></div>
        <div id="docs-alert-error"   class="alert alert-error"></div>

        <div class="upload-zone" id="upload-zone">
          <input type="file" id="file-input" multiple onchange="handleFiles(this.files)" />
          <div class="upload-icon">↑</div>
          <div class="upload-text">Upload Documents</div>
          <div class="upload-sub">Click or drag &amp; drop · PDF, DOC, XLSX, PNG, JPG</div>
        </div>

        <div class="upload-progress" id="upload-progress">
          <span id="upload-filename" style="min-width:150px;color:var(--gold)"></span>
          <div class="progress-bar-wrap">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
          <span id="upload-pct" style="min-width:36px;text-align:right;color:var(--text-muted)">0%</span>
        </div>

        <div class="card" style="padding:0;overflow:hidden">
          <table class="doc-table">
            <thead>
              <tr>
                <th>File name</th>
                <th>Size</th>
                <th>Uploaded</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="doc-list">
              <tr class="empty-row"><td colspan="4">No documents uploaded yet.</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- PROCESSES -->
      <div class="tab-pane" id="tab-processes">
        <div class="section-heading">
          <h2>Accounting Processes</h2>
          <span class="tag">Status Board</span>
        </div>

        <div id="processes-list"></div>
      </div>

    </div><!-- /tab-content -->
  </div><!-- /portal-body -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPA_URL = 'https://jlcjdhzdcuwwibqmyfcy.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsY2pkaHpkY3V3d2licW15ZmN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MDM1MDYsImV4cCI6MjA5NDM3OTUwNn0.iNuq_4HO9xlQeUw0fw8lRkSU1b-FrPeZqJzTNzw_y1k';
    const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

    let currentUser = null;
    let documents   = [];

    // ── Auth guard ─────────────────────────────────────────────────────────────
    (async function() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { location.replace('login.html'); return; }
      currentUser = session.user;

      const { data: profile } = await sb
        .from('profiles')
        .select('full_name, role, phone, company_name')
        .eq('id', currentUser.id)
        .single();

      if (!profile || profile.role !== 'client') {
        location.replace('crm.html');
        return;
      }

      // Populate topbar
      const name = profile.full_name || currentUser.email;
      const initials = name.split(' ').map(p => p[0]).join('').slice(0, 2).toUpperCase();
      document.getElementById('topbar-username').textContent = name;
      document.getElementById('user-initials').textContent = initials;

      // Populate details form
      document.getElementById('d-email').value   = currentUser.email;
      document.getElementById('d-name').value    = profile.full_name    || '';
      document.getElementById('d-phone').value   = profile.phone        || '';
      document.getElementById('d-company').value = profile.company_name || '';

      // Load data
      await Promise.all([loadDocuments(), loadProcesses()]);
    }());

    async function logout() {
      await sb.auth.signOut();
      location.replace('login.html');
    }

    // ── Tabs ───────────────────────────────────────────────────────────────────
    function switchTab(name, btn) {
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      btn.classList.add('active');
    }

    // ── Alert helpers ──────────────────────────────────────────────────────────
    function showAlert(id, msg, timeout = 4000) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('visible');
      if (timeout) setTimeout(() => el.classList.remove('visible'), timeout);
    }

    // ── Details ────────────────────────────────────────────────────────────────
    async function saveDetails() {
      const name    = document.getElementById('d-name').value.trim();
      const phone   = document.getElementById('d-phone').value.trim();
      const company = document.getElementById('d-company').value.trim();

      if (!name) { showAlert('details-alert-error', 'Full name is required.'); return; }

      const btn = document.getElementById('btn-save-details');
      btn.disabled = true;
      btn.textContent = 'Saving…';

      const { error } = await sb.from('profiles').update({
        full_name:    name,
        phone:        phone   || null,
        company_name: company || null,
      }).eq('id', currentUser.id);

      btn.disabled = false;
      btn.textContent = 'Save Changes';

      if (error) {
        showAlert('details-alert-error', error.message);
      } else {
        showAlert('details-alert-success', 'Profile updated successfully.');
        const initials = name.split(' ').map(p => p[0]).join('').slice(0, 2).toUpperCase();
        document.getElementById('topbar-username').textContent = name;
        document.getElementById('user-initials').textContent = initials;
      }
    }

    // ── Documents ──────────────────────────────────────────────────────────────
    async function loadDocuments() {
      const { data, error } = await sb
        .from('documents')
        .select('*')
        .eq('client_id', currentUser.id)
        .order('created_at', { ascending: false });

      if (error) { console.error('loadDocuments:', error); return; }
      documents = data || [];
      renderDocuments();
    }

    function renderDocuments() {
      const tbody = document.getElementById('doc-list');
      const tag   = document.getElementById('doc-count-tag');
      tag.textContent = documents.length + ' file' + (documents.length !== 1 ? 's' : '');

      if (documents.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="4">No documents uploaded yet.</td></tr>';
        return;
      }

      tbody.innerHTML = documents.map(d => `
        <tr>
          <td>
            <span class="doc-name">
              <span class="doc-icon">${fileIcon(d.name)}</span>
              ${escHtml(d.name)}
            </span>
          </td>
          <td class="doc-size">${formatBytes(d.size || 0)}</td>
          <td class="doc-date">${formatDate(d.uploaded_at)}</td>
          <td>
            <div class="doc-actions">
              <button class="btn btn-outline btn-sm" onclick="downloadDoc('${d.storage_path}', '${escHtml(d.name)}')">↓ Download</button>
              <button class="btn btn-danger btn-sm" onclick="deleteDoc('${d.id}', '${d.storage_path}')">✕</button>
            </div>
          </td>
        </tr>`).join('');
    }

    function fileIcon(name) {
      const ext = (name || '').split('.').pop().toLowerCase();
      if (['pdf'].includes(ext)) return '📄';
      if (['doc','docx'].includes(ext)) return '📝';
      if (['xls','xlsx','csv'].includes(ext)) return '📊';
      if (['png','jpg','jpeg','gif','webp'].includes(ext)) return '🖼️';
      return '📁';
    }

    async function handleFiles(files) {
      if (!files || files.length === 0) return;
      for (const file of files) {
        await uploadFile(file);
      }
      document.getElementById('file-input').value = '';
    }

    async function uploadFile(file) {
      const progress = document.getElementById('upload-progress');
      const bar      = document.getElementById('progress-bar');
      const pct      = document.getElementById('upload-pct');
      const fname    = document.getElementById('upload-filename');

      progress.classList.add('visible');
      bar.style.width = '10%';
      pct.textContent = '10%';
      fname.textContent = file.name;

      const storagePath = `${currentUser.id}/${Date.now()}_${file.name}`;
      const { error: upErr } = await sb.storage
        .from('client-documents')
        .upload(storagePath, file);

      bar.style.width = '70%';
      pct.textContent = '70%';

      if (upErr) {
        progress.classList.remove('visible');
        showAlert('docs-alert-error', 'Upload failed: ' + upErr.message);
        return;
      }

      const { error: dbErr } = await sb.from('documents').insert({
        client_id:    currentUser.id,
        name:         file.name,
        size:         file.size,
        mime_type:    file.type,
        storage_path: storagePath,
      });

      bar.style.width = '100%';
      pct.textContent = '100%';

      setTimeout(() => {
        progress.classList.remove('visible');
        bar.style.width = '0%';
      }, 600);

      if (dbErr) {
        showAlert('docs-alert-error', 'File saved but record failed: ' + dbErr.message);
        return;
      }

      showAlert('docs-alert-success', `${file.name} uploaded successfully.`);
      await loadDocuments();
    }

    async function downloadDoc(storagePath, fileName) {
      const { data, error } = await sb.storage
        .from('client-documents')
        .download(storagePath);

      if (error) { showAlert('docs-alert-error', 'Download failed: ' + error.message); return; }

      const url = URL.createObjectURL(data);
      const a   = document.createElement('a');
      a.href = url; a.download = fileName;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    async function deleteDoc(docId, storagePath) {
      if (!confirm('Delete this document? This cannot be undone.')) return;

      const { error: stErr } = await sb.storage.from('client-documents').remove([storagePath]);
      if (stErr) { showAlert('docs-alert-error', 'Storage delete failed: ' + stErr.message); return; }

      const { error: dbErr } = await sb.from('documents').delete().eq('id', docId);
      if (dbErr) { showAlert('docs-alert-error', 'Record delete failed: ' + dbErr.message); return; }

      documents = documents.filter(d => d.id !== docId);
      renderDocuments();
      showAlert('docs-alert-success', 'Document deleted.');
    }

    // Drag & drop
    const zone = document.getElementById('upload-zone');
    zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      handleFiles(e.dataTransfer.files);
    });

    // ── Processes ─────────────────────────────────────────────────────────────
    async function loadProcesses() {
      const { data, error } = await sb
        .from('accounting_processes')
        .select('*')
        .eq('client_id', currentUser.id)
        .order('created_at', { ascending: false });

      if (error) { console.error('loadProcesses:', error); return; }
      renderProcesses(data || []);
    }

    function renderProcesses(procs) {
      const container = document.getElementById('processes-list');

      if (procs.length === 0) {
        container.innerHTML = '<div class="no-processes">No active processes — your accountant will add them here.</div>';
        return;
      }

      const badgeClass = {
        pending:     'badge-pending',
        in_progress: 'badge-in_progress',
        review:      'badge-review',
        completed:   'badge-completed',
      };

      const badgeLabel = {
        pending:     'Pending',
        in_progress: 'In Progress',
        review:      'Under Review',
        completed:   'Completed',
      };

      container.innerHTML = procs.map(p => `
        <div class="process-card">
          <div class="process-info">
            <div class="process-name">${escHtml(p.title)}</div>
            ${p.description ? `<div class="process-desc">${escHtml(p.description)}</div>` : ''}
            <div class="process-meta">Started: ${formatDateShort(p.created_at)}</div>
          </div>
          <span class="status-badge ${badgeClass[p.status] || 'badge-pending'}">
            ${badgeLabel[p.status] || p.status}
          </span>
        </div>`).join('');
    }

    // ── Utils ──────────────────────────────────────────────────────────────────
    function escHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatBytes(bytes) {
      if (bytes === 0) return '—';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function formatDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleString('en-ZA', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function formatDateShort(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: 'numeric' });
    }
  </script>
</body>
</html>
