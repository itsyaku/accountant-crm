<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YAKU Accounting — Client Portal Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #05080f;
      --bg-input: #0a1018;
      --accent: #ff4522;
      --cyan: #00a3e0;
      --text: #ffffff;
      --muted: #5a6478;
      --border-input: #1a3a52;
    }

    body {
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(0, 163, 224, 0.12) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      opacity: 0.35;
    }

    .login-shell {
      position: relative;
      width: 100%;
      max-width: 480px;
    }

    .protocol-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.25rem;
    }

    .protocol-label::before {
      content: '▶';
      font-size: 0.55rem;
    }

    .title-block {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.5rem, 8vw, 3.75rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .title-block span {
      display: block;
    }

    .subtitle {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
      line-height: 1.5;
    }

    .error-msg {
      display: none;
      border-left: 3px solid var(--accent);
      padding: 0.75rem 1rem;
      margin-bottom: 1.75rem;
      font-size: 0.78rem;
      line-height: 1.5;
      color: var(--accent);
    }

    .error-msg.visible { display: block; }

    .error-msg .error-code {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--cyan);
      margin-bottom: 0.5rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: var(--bg-input);
      border: 1px solid var(--border-input);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 1px rgba(0, 163, 224, 0.25);
    }

    .form-group input::placeholder {
      color: #3d4f63;
    }

    .btn-login {
      width: 100%;
      margin-top: 0.5rem;
      padding: 1rem 1.25rem;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: background 0.2s, color 0.2s;
    }

    .btn-login::before {
      content: '▶';
      font-size: 0.55rem;
    }

    .btn-login:hover {
      background: rgba(255, 69, 34, 0.08);
    }

    .btn-login:active {
      transform: scale(0.99);
    }

    .btn-login:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .footer-rule {
      border: none;
      border-top: 1px solid #141c28;
      margin: 2.5rem 0 1.25rem;
    }

    .footer-links {
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .footer-links a {
      color: var(--cyan);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .footer-links a:hover {
      color: #33b8eb;
    }

    .demo-row {
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .demo-label {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }

    .btn-demo {
      width: 100%;
      padding: 0.65rem 1rem;
      background: transparent;
      border: 1px solid #1a2838;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-demo:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }
  </style>
</head>
<body>

  <div class="login-shell">
    <p class="protocol-label">Authentication Protocol</p>

    <h1 class="title-block">
      <span>Initiate</span>
      <span>Session</span>
    </h1>

    <p class="subtitle">Enter credentials to access secure client node.</p>

    <div class="error-msg" id="error-msg" role="alert">
      <div class="error-code">// SYSTEM ERROR</div>
      <div>Invalid credentials — access denied.</div>
    </div>

    <div class="form-group">
      <label for="email">[ Email address ]</label>
      <input type="email" id="email" placeholder="admin@creativeafrica.co.za" autocomplete="email" />
    </div>

    <div class="form-group">
      <label for="password">[ Password ]</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button type="button" class="btn-login" id="btn-login" onclick="attemptLogin()">Sign in to client portal</button>

    <hr class="footer-rule" />

    <p class="footer-links">
      First access? <a href="index.html">Return to site →</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const sb = supabase.createClient(
      'https://jlcjdhzdcuwwibqmyfcy.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsY2pkaHpkY3V3d2licW15ZmN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MDM1MDYsImV4cCI6MjA5NDM3OTUwNn0.iNuq_4HO9xlQeUw0fw8lRkSU1b-FrPeZqJzTNzw_y1k'
    );

    const errEl = document.getElementById('error-msg');
    const errDetail = errEl.children[1];
    const btn = document.getElementById('btn-login');

    function showError(title, message) {
      errEl.querySelector('.error-code').textContent = title;
      errDetail.textContent = message;
      errEl.classList.add('visible');
    }

    function hideError() {
      errEl.classList.remove('visible');
    }

    async function redirectForSession(session) {
      const { data: profile, error } = await sb
        .from('profiles')
        .select('role')
        .eq('id', session.user.id)
        .single();

      if (error || !profile) {
        await sb.auth.signOut();
        showError('// SYSTEM ERROR', error?.message || 'No profile found for this account.');
        return;
      }

      if (profile.role === 'admin') location.replace('crm.html');
      else if (profile.role === 'client') location.replace('client-portal.html');
      else showError('// ACCESS DENIED', 'Your account does not have portal access.');
    }

    (async function checkExistingSession() {
      const { data: { session } } = await sb.auth.getSession();
      if (session) await redirectForSession(session);
    }());

    async function attemptLogin() {
      hideError();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('// VALIDATION ERROR', 'Email and password are required.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Authenticating…';

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      btn.disabled = false;
      btn.textContent = 'Sign in to client portal';

      if (error) {
        showError('// SYSTEM ERROR', error.message);
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
        return;
      }

      await redirectForSession(data.session);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') attemptLogin();
    });

    document.getElementById('email').focus();
  </script>
</body>
</html>
