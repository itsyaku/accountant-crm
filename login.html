<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YAKU Accounting — Secure Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #08060a;
      --glass:        rgba(40,28,8,.52);
      --glass-input:  rgba(15,10,2,.72);
      --border:       rgba(201,162,39,.14);
      --border-strong:rgba(201,162,39,.30);
      --gold:         #c9a227;
      --gold-bright:  #e8c040;
      --gold-dim:     rgba(201,162,39,.35);
      --text:         #f5ead6;
      --text-muted:   #8a7055;
      --text-dim:     #4a3a25;
      --red:          #e06060;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background:
        radial-gradient(circle at 78% -8%,  rgba(201,162,39,.15) 0%, transparent 42%),
        radial-gradient(circle at -5% 95%,  rgba(160,100,15,.10) 0%, transparent 40%),
        radial-gradient(circle at 45% 55%,  rgba(90, 55,  5,.04) 0%, transparent 65%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      position: relative;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .022;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
    }

    .login-card {
      background: var(--glass);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2.75rem 2.5rem;
      box-shadow:
        0 0 80px rgba(201,162,39,.07),
        0 32px 80px rgba(0,0,0,.5),
        inset 0 1px 0 rgba(201,162,39,.12);
    }

    /* ── Brand ── */
    .brand { text-align: center; margin-bottom: 1.75rem; }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.25rem;
      font-weight: 300;
      letter-spacing: .4em;
      color: var(--gold);
      line-height: 1;
      text-transform: uppercase;
    }

    .brand-rule {
      width: 40px;
      height: 1px;
      background: var(--gold-dim);
      margin: .65rem auto;
    }

    .brand-sub {
      font-size: .68rem;
      font-weight: 400;
      letter-spacing: .38em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
      margin-bottom: 1.75rem;
    }

    /* ── Heading ── */
    .card-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: .3rem;
    }

    .card-sub {
      font-size: .78rem;
      font-weight: 300;
      color: var(--text-muted);
      margin-bottom: 1.75rem;
      line-height: 1.5;
    }

    /* ── Error ── */
    .error-msg {
      display: none;
      background: rgba(180,50,50,.1);
      border: 1px solid rgba(200,80,80,.2);
      border-left: 3px solid var(--red);
      border-radius: 6px;
      padding: .75rem 1rem;
      margin-bottom: 1.5rem;
      font-size: .78rem;
      color: var(--red);
      line-height: 1.5;
    }
    .error-msg.visible { display: block; }
    .error-code { font-size: .67rem; font-weight: 600; letter-spacing: .08em; margin-bottom: .2rem; opacity: .75; }

    /* ── Form ── */
    .form-group { margin-bottom: 1.25rem; }

    .form-group label {
      display: block;
      font-size: .68rem;
      font-weight: 500;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: .5rem;
    }

    .form-group input {
      width: 100%;
      padding: .82rem 1rem;
      background: var(--glass-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: .9rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-group input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,162,39,.1);
    }
    .form-group input::placeholder { color: var(--text-dim); }

    /* ── Button ── */
    .btn-login {
      width: 100%;
      margin-top: .5rem;
      padding: .9rem;
      background: var(--gold);
      border: none;
      border-radius: 8px;
      color: #08060a;
      font-family: 'Outfit', sans-serif;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .16em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, box-shadow .2s, transform .1s;
      box-shadow: 0 4px 28px rgba(201,162,39,.28);
    }
    .btn-login:hover { background: var(--gold-bright); box-shadow: 0 4px 36px rgba(201,162,39,.38); }
    .btn-login:active { transform: scale(.99); }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ── Footer ── */
    .footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: .78rem;
      font-weight: 300;
    }
    .footer-link a { color: var(--text-muted); text-decoration: none; transition: color .2s; }
    .footer-link a:hover { color: var(--gold); }
  </style>
</head>
<body>

  <div class="login-wrap">
    <div class="login-card">

      <div class="brand">
        <div class="brand-name">YAKU</div>
        <div class="brand-rule"></div>
        <div class="brand-sub">Accounting</div>
      </div>

      <div class="divider"></div>

      <h1 class="card-heading">Secure Access</h1>
      <p class="card-sub">Enter your credentials to continue</p>

      <div class="error-msg" id="error-msg" role="alert">
        <div class="error-code">Access Denied</div>
        <div>Invalid credentials — please try again.</div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button type="button" class="btn-login" id="btn-login" onclick="attemptLogin()">Sign In</button>

      <p class="footer-link"><a href="index.html">← Return to website</a></p>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const sb = supabase.createClient(
      'https://jlcjdhzdcuwwibqmyfcy.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsY2pkaHpkY3V3d2licW15ZmN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MDM1MDYsImV4cCI6MjA5NDM3OTUwNn0.iNuq_4HO9xlQeUw0fw8lRkSU1b-FrPeZqJzTNzw_y1k'
    );

    const errEl = document.getElementById('error-msg');
    const errDetail = errEl.children[1];
    const btn = document.getElementById('btn-login');

    function showError(title, message) {
      errEl.querySelector('.error-code').textContent = title;
      errDetail.textContent = message;
      errEl.classList.add('visible');
    }

    function hideError() {
      errEl.classList.remove('visible');
    }

    async function redirectForSession(session) {
      const { data: profile, error } = await sb
        .from('profiles')
        .select('role')
        .eq('id', session.user.id)
        .single();

      if (error || !profile) {
        await sb.auth.signOut();
        showError('// SYSTEM ERROR', error?.message || 'No profile found for this account.');
        return;
      }

      if (profile.role === 'admin') location.replace('crm.html');
      else if (profile.role === 'client') location.replace('client-portal.html');
      else showError('// ACCESS DENIED', 'Your account does not have portal access.');
    }

    (async function checkExistingSession() {
      const { data: { session } } = await sb.auth.getSession();
      if (session) await redirectForSession(session);
    }());

    async function attemptLogin() {
      hideError();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('// VALIDATION ERROR', 'Email and password are required.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Authenticating…';

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      btn.disabled = false;
      btn.textContent = 'Sign In';

      if (error) {
        showError('// SYSTEM ERROR', error.message);
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
        return;
      }

      await redirectForSession(data.session);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') attemptLogin();
    });

    document.getElementById('email').focus();
  </script>
</body>
</html>
